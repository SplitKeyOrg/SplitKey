# motion daemon — detection only. Writes event movies straight to the tmpfs
# handoff dir the sealer watches. Privacy posture: no stills, no live stream,
# no web control surface.
daemon off
log_level 6
# surface detection events in `docker compose logs`:
log_file /dev/stderr

video_device /dev/video0
width 1280
height 720
framerate 15

target_dir /dev/shm/splitkey-clips
movie_output on
movie_codec mkv
# ≈ one sealer segment per minute of motion:
movie_max_time 60

picture_output off
stream_port 0
webcontrol_port 0
